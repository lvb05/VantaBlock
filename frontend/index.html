<style>
  :root {

  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:1.25rem 3rem; border-bottom:1px solid var(--border);

  }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; color:var(--accent); letter-spacing:-0.5px; }
  .logo span { color:var(--text); }
  nav a { color:var(--muted); text-decoration:none; margin-left:2rem; font-size:0.9rem; transition:color 0.2s; }
  nav a:hover { color:var(--text); }
  .cart-btn {
    background:var(--accent); color:#000; font-family:'Syne',sans-serif; font-weight:700;
    border:none; padding:0.55rem 1.25rem; border-radius:2px; cursor:pointer; font-size:0.85rem;
    text-decoration:none; display:flex; align-items:center; gap:0.5rem;
  }
  .cart-count { background:#000; color:var(--accent); border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:0.7rem; }

  .hero { padding:4rem 3rem 2rem; border-bottom:1px solid var(--border); }
  .hero-tag { font-size:0.75rem; color:var(--accent); letter-spacing:3px; text-transform:uppercase; margin-bottom:1rem; }
  .hero h1 { font-family:'Syne',sans-serif; font-size:clamp(2.5rem,5vw,4.5rem); font-weight:800; line-height:1; letter-spacing:-2px; }
  .hero h1 em { color:var(--accent); font-style:normal; }
  .filter-bar { display:flex; gap:0.75rem; padding:1.5rem 3rem; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .filter-btn {
    border:1px solid var(--border); background:transparent; color:var(--muted);
    padding:0.4rem 1rem; border-radius:2px; cursor:pointer; font-size:0.8rem; font-family:'DM Sans',sans-serif;
    transition:all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1px; padding:0; background:var(--border); }
  .product-card {
    background:var(--card); padding:1.75rem; cursor:pointer;
    transition:background 0.2s; position:relative; overflow:hidden;
    text-decoration:none; color:inherit; display:block;
  }
  .product-card:hover { background:#222; }
  .product-card:hover .card-cta { opacity:1; transform:translateY(0); }
  .badge {
    position:absolute; top:1rem; right:1rem;
    font-size:0.65rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    padding:0.2rem 0.5rem; border-radius:1px;
  }
  .badge-new { background:var(--accent); color:#000; }
  .badge-sale { background:var(--accent2); color:#fff; }
  .img-placeholder {
    width:100%; height:180px; background:#222; border-radius:2px; margin-bottom:1.25rem;
    display:flex; align-items:center; justify-content:center; font-size:2.5rem;
  }
  .card-brand { font-size:0.7rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:0.3rem; }
  .card-name { font-family:'Syne',sans-serif; font-weight:700; font-size:1.05rem; margin-bottom:0.5rem; }
  .card-price { font-size:1.1rem; font-weight:500; color:var(--accent); }
  .card-price s { color:var(--muted); font-size:0.85rem; margin-right:0.4rem; }
  .card-rating { color:var(--muted); font-size:0.8rem; margin-top:0.4rem; }
  .card-cta {
    margin-top:1rem; background:var(--accent); color:#000; border:none;
    width:100%; padding:0.65rem; font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem;
    cursor:pointer; border-radius:1px; opacity:0; transform:translateY(6px); transition:all 0.2s;
  }

  footer { padding:2rem 3rem; border-top:1px solid var(--border); color:var(--muted); font-size:0.8rem; display:flex; justify-content:space-between; }

// Helper: render product grid based on filtered list
function renderProducts(list) {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = list.map(p => `
    <a class="product-card" href="product.html?id=${p.id}" data-log-id="card-${p.id}" data-category="${p.category}">
      ${p.badge ? `<span class="badge badge-${p.badge}">${p.badge}</span>` : ''}
      <div class="img-placeholder">${p.emoji}</div>
      <div class="card-brand">${p.brand}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-price">${p.original ? `<s>$${p.original}</s>` : ''}$${p.price}</div>
      <div class="card-rating">${p.rating}</div>
      <button class="card-cta" data-log-id="quickadd-${p.id}" onclick="quickAdd(event,'${p.id}','${p.name.replace(/'/g, "\\'")}',${p.price})">Quick Add to Cart</button>
    </a>
  `).join('');
}

// Global filter function (called from filter buttons)
function filterProducts(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat);
  renderProducts(filtered);
}

// Quick add to cart with localStorage
function quickAdd(e, id, name, price) {
  e.preventDefault();
  e.stopPropagation();
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const existing = cart.find(i => i.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ id, name, price, qty: 1 });
  }
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  // subtle micro feedback (optional but nice)
  const btn = e.currentTarget;
  const originalText = btn.innerText;
  btn.innerText = '✓ Added!';
  setTimeout(() => { if(btn) btn.innerText = originalText; }, 800);
}

// Update cart badge count
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const total = cart.reduce((sum, i) => sum + i.qty, 0);
  document.getElementById('cartCount').textContent = total;
}

// initial render of all 55 products

updateCartCount();
