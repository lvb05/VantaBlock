<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VantaBlock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 220px;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      border-radius: 16px;
      overflow: hidden;
    }

    .container {
      padding: 0;
    }

    /* Logo – full width banner */
    .header {
      width: 100%;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eef2f6;
    }

    .logo {
      width: 100%;
      text-align: center;
    }

    .logo img {
      width: 70%;
      max-height: 50px;
      object-fit: contain;
    }

    /* Content area with padding */
    .content {
      padding: 12px;
    }

    .status-card {
      background: #f8f9fc;
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      margin-bottom: 10px;
      border: 1px solid #eef2f6;
      transition: all 0.3s ease;
    }

    .status-card.human {
      background: #e8f5e9;
      border: 1px solid #c8e6c9;
    }

    .status-card.bot {
      background: #fdecea;
      border: 1px solid #f5c6cb;
    }

    .status-card.unknown {
      background: #fff4e5;
      border: 1px solid #ffe0b2;
    }

    .status-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6c757d;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .verdict {
      font-size: 22px;
      font-weight: 800;
      margin: 6px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.3px;
    }

    .confidence {
      font-size: 8px;
      background: #ffffff;
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      color: #2c3e50;
      border: 1px solid #e2e8f0;
      margin-top: 4px;
    }

    .human {
      color: #2e7d32;
    }

    .bot {
      color: #d32f2f;
    }

    .unknown {
      color: #ed6c02;
    }

    .stats {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .stat-box {
      background: #f8f9fc;
      border-radius: 10px;
      padding: 8px 4px;
      flex: 1;
      text-align: center;
      border: 1px solid #eef2f6;
      transition: all 0.2s ease;
    }

    .stat-number {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .stat-label {
      font-size: 8px;
      font-weight: 500;
      color: #6c757d;
      text-transform: uppercase;
      margin-top: 2px;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #1a1a2e, #2d2d44);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26, 26, 46, 0.15);
    }

    .footer {
      font-size: 7px;
      text-align: center;
      margin-top: 8px;
      color: #adb5bd;
      font-weight: 500;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Full‑width logo banner -->
    <div class="header">
      <div class="logo">
        <img src="icon_nobackgrnd.png" alt="VantaBlock">
      </div>
    </div>

    <div class="content">
      <div class="status-card" id="statusCard">
        <div class="status-label">
          <span class="dot"></span> LIVE DETECTION
        </div>
        <div class="verdict" id="verdictText">🔄 Analyzing</div>
        <div class="confidence" id="confidenceText">Awaiting scan results</div>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-number" id="totalChecks">0</div>
          <div class="stat-label">Scans</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="blockedCount">0</div>
          <div class="stat-label">Threats</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="humanCount">0</div>
          <div class="stat-label">Safe</div>
        </div>
      </div>

      <button id="refreshBtn">
        <span>⟳</span> Refresh
      </button>
      <div class="footer">
        Protection Active • Real-time
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
